<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="视频下载">
    <title>抖音/TikTok 无水印下载</title>
    <style>
        :root { --bg:#f5f5f7; --card:#fff; --text:#1d1d1f; --sub:#86868b; --accent:#ff6b35; --border:#e5e5ea; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .container { max-width:480px; margin:0 auto; padding:20px 16px 60px; }
        .header { text-align:center; padding:24px 0 16px; }
        .header h1 { font-size:26px; font-weight:700; }
        .header p { color:var(--sub); font-size:14px; margin-top:4px; }
        .card { background:var(--card); border-radius:16px; padding:18px; margin-bottom:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
        textarea { width:100%; border:2px solid var(--border); border-radius:12px; padding:12px; font-size:15px; resize:none; height:80px; font-family:inherit; outline:none; background:#fafafa; }
        textarea:focus { border-color:var(--accent); background:#fff; }
        .btn { display:block; width:100%; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:600; cursor:pointer; text-align:center; margin-top:10px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:active { background:#e55a2b; transform:scale(0.98); }
        .btn-primary:disabled { background:#ffb899; }
        .spinner { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .result { display:none; }
        .result.show { display:block; }
        .video-preview { border-radius:12px; overflow:hidden; background:#000; margin-bottom:10px; }
        .video-preview img,.video-preview video { width:100%; display:block; }
        .video-preview video { max-height:320px; }
        .info-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        .info-row .avatar { width:28px; height:28px; border-radius:50%; }
        .info-row .author { font-size:14px; color:var(--sub); }
        .title { font-size:15px; font-weight:600; line-height:1.4; margin-bottom:4px; }
        .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 24px; border-radius:24px; font-size:15px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
        .toast.show { opacity:1; }
        .progress-wrap { display:none; margin-top:10px; }
        .progress-wrap.show { display:block; }
        .progress-bar { height:6px; background:#e5e5ea; border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; background:var(--accent); border-radius:3px; width:0%; transition:width .2s; }
        .progress-text { text-align:center; font-size:13px; color:var(--sub); margin-top:6px; }
        .error { display:none; background:#ffebee; color:#c62828; border-radius:12px; padding:12px; margin-top:10px; font-size:13px; }
        .error.show { display:block; }
        .tips { display:none; background:#fff3e0; border-radius:12px; padding:14px; margin-top:12px; font-size:13px; color:#e65100; line-height:1.8; }
        .tips.show { display:block; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📹 视频下载器</h1>
        <p>抖音 · TikTok 无水印下载</p>
    </div>
    <div class="card">
        <textarea id="linkInput" placeholder="粘贴抖音/TikTok 分享链接到这里..."></textarea>
        <button class="btn btn-primary" id="parseBtn" onclick="parseVideo()">🔍 解析视频</button>
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <p class="progress-text" id="progressText"></p>
        </div>
        <div class="error" id="errorMsg"></div>
    </div>
    <div class="card result" id="resultCard">
        <div class="video-preview">
            <img id="coverImg" src="" alt="">
            <video id="videoPlayer" controls style="display:none" playsinline></video>
        </div>
        <div class="info-row">
            <img class="avatar" id="authorAvatar" src="" alt="">
            <span class="author" id="authorName"></span>
        </div>
        <p class="title" id="videoTitle"></p>
        <button class="btn btn-primary" id="downloadBtn" onclick="downloadVideo()">⬇️ 下载视频</button>
    </div>
    <div class="tips" id="saveTips">
        💡 <b>保存到相册：</b>下载完成后 → 长按视频 → <b>「保存视频」</b>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
// DOM
var E=function(id){return document.getElementById(id);};
var linkInput=E('linkInput'),parseBtn=E('parseBtn'),progressWrap=E('progressWrap'),
    progressFill=E('progressFill'),progressText=E('progressText'),errorMsg=E('errorMsg'),
    resultCard=E('resultCard'),coverImg=E('coverImg'),videoPlayer=E('videoPlayer'),
    authorAvatar=E('authorAvatar'),authorName=E('authorName'),videoTitle=E('videoTitle'),
    saveTips=E('saveTips'),downloadBtn=E('downloadBtn'),toast=E('toast');

var videoData=null;

// 检测是否通过本地服务器访问
var isLocal=location.hostname==='localhost'||location.hostname.indexOf('192.168.')===0||
    location.hostname.indexOf('10.')===0||location.hostname.indexOf('172.')===0;

// API 地址
var API_HOST='https://api.douyin.wtf';
var API_PATH='/api/hybrid/video_data';

// ============================================================
// 解析视频
// ============================================================
function parseVideo(){
    var raw=linkInput.value.trim();
    if(!raw){showErr('请先粘贴抖音/TikTok 的分享链接');return;}
    var url=extractUrl(raw);
    if(!url){showErr('未识别到有效链接，请确认是抖音/TikTok 分享链接');return;}

    hideErr();setLoading(true,'正在解析...');
    resultCard.classList.remove('show');saveTips.classList.remove('show');

    // 本地服务器走代理，在线直连 + CORS回退
    var apiUrl;
    if(isLocal){
        apiUrl=API_PATH+'?url='+encodeURIComponent(url);
    }else{
        apiUrl=API_HOST+API_PATH+'?url='+encodeURIComponent(url);
    }

    progressText.textContent='正在请求 API...';
    progressFill.style.width='30%';

    doFetch(apiUrl,function(err,json){
        if(err){
            // 直连失败，试 CORS 代理
            if(!isLocal){
                progressText.textContent='尝试 CORS 代理...';
                progressFill.style.width='50%';
                var proxyUrl='https://corsproxy.io/?'+encodeURIComponent(apiUrl);
                doFetch(proxyUrl,function(err2,json2){
                    if(err2){
                        showErr('解析失败，请确认：\n1. 链接是否有效\n2. 网络是否正常\n3. 稍后重试\n\n('+err2+')');
                        setLoading(false);
                    }else{
                        processResult(json2);
                    }
                });
            }else{
                showErr('解析失败：'+err+'\n请确认链接有效后重试');
                setLoading(false);
            }
            return;
        }
        processResult(json);
    });
}

function processResult(json){
    progressFill.style.width='70%';
    progressText.textContent='正在解析数据...';

    var d=(json.data&&json.data.hybrid&&json.data.hybrid.video_data)||json.data;
    if(!d||(!d.video_url&&!d.play&&!d.download_url)){
        showErr('未找到无水印视频\n该视频可能已被删除或无法解析');
        setLoading(false);
        return;
    }

    videoData={
        title:d.title||'未知标题',
        author:d.nickname||(d.author&&d.author.nickname)||'未知作者',
        avatar:d.avatar||(d.author&&d.author.avatar)||'',
        cover:d.cover||'',
        videoUrl:d.video_url||d.play||d.download_url||'',
        duration:d.duration||0
    };

    if(videoData.cover){coverImg.src=videoData.cover;coverImg.style.display='block';videoPlayer.style.display='none';}
    if(videoData.avatar)authorAvatar.src=videoData.avatar;
    authorName.textContent='@'+videoData.author;
    videoTitle.textContent=videoData.title;
    resultCard.classList.add('show');
    downloadBtn.innerHTML='⬇️ 下载视频';
    downloadBtn.disabled=false;

    progressFill.style.width='100%';
    progressText.textContent='✅ 解析完成';
    setTimeout(function(){setLoading(false);},600);
}

// ============================================================
// 下载视频
// ============================================================
function downloadVideo(){
    if(!videoData||!videoData.videoUrl){showErr('没有可下载的视频');return;}

    downloadBtn.disabled=true;
    downloadBtn.innerHTML='<span class="spinner"></span>正在下载...';
    saveTips.classList.remove('show');

    var xhr=new XMLHttpRequest();
    xhr.open('GET',videoData.videoUrl,true);
    xhr.responseType='blob';
    xhr.onload=function(){
        if(xhr.status===200){
            var blob=xhr.response;
            var blobUrl=URL.createObjectURL(blob);
            videoPlayer.src=blobUrl;
            videoPlayer.style.display='block';
            coverImg.style.display='none';

            // 触发下载
            var a=document.createElement('a');
            a.href=blobUrl;
            a.download=safeFileName(videoData.author+'_'+videoData.title)+'.mp4';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            downloadBtn.innerHTML='✅ 下载完成';
            downloadBtn.disabled=false;
            saveTips.classList.add('show');
            toastMsg('✅ 已保存！长按视频可存到相册');
            setTimeout(function(){URL.revokeObjectURL(blobUrl);},120000);
        }else{
            downloadFallback();
        }
    };
    xhr.onerror=downloadFallback;
    xhr.send();

    function downloadFallback(){
        window.open(videoData.videoUrl,'_blank');
        downloadBtn.innerHTML='⬇️ 在新窗口打开';
        downloadBtn.disabled=false;
        saveTips.classList.add('show');
        toastMsg('已打开视频，点分享→存储视频');
    }
}

// ============================================================
// 工具函数
// ============================================================
function doFetch(url,cb){
    var xhr=new XMLHttpRequest();
    xhr.open('GET',url,true);
    xhr.timeout=15000;
    xhr.onload=function(){
        if(xhr.status>=200&&xhr.status<300){
            try{cb(null,JSON.parse(xhr.responseText));}catch(e){cb('解析响应失败');}
        }else{
            cb('HTTP '+xhr.status);
        }
    };
    xhr.onerror=function(){cb('网络请求失败，可能是CORS限制');};
    xhr.ontimeout=function(){cb('请求超时');};
    xhr.send();
}

function extractUrl(text){
    var ps=[
        /https?:\/\/v\.douyin\.com\/[A-Za-z0-9]+\/?/,
        /https?:\/\/www\.douyin\.com\/[^\s]+/,
        /https?:\/\/www\.iesdouyin\.com\/[^\s]+/,
        /https?:\/\/vm\.tiktok\.com\/[A-Za-z0-9]+\/?/,
        /https?:\/\/www\.tiktok\.com\/[^\s]+/,
        /https?:\/\/[^\s]*douyin[^\s]*/i,
        /https?:\/\/[^\s]*tiktok[^\s]*/i
    ];
    for(var i=0;i<ps.length;i++){var m=text.match(ps[i]);if(m)return m[0];}
    return null;
}

function safeFileName(name){
    return name.replace(/[<>:"/\\|?*\r\n\t]/g,'_').substring(0,200);
}

function setLoading(on,txt){
    if(on){parseBtn.disabled=true;parseBtn.innerHTML='<span class="spinner"></span>'+txt;progressWrap.classList.add('show');}
    else{parseBtn.disabled=false;parseBtn.innerHTML='🔍 解析视频';progressWrap.classList.remove('show');}
}
function showErr(m){errorMsg.textContent=m;errorMsg.classList.add('show');}
function hideErr(){errorMsg.classList.remove('show');}
function toastMsg(m,d){d=d||2500;toast.textContent=m;toast.classList.add('show');setTimeout(function(){toast.classList.remove('show');},d);}

// 剪贴板
function pasteLink(){
    try{navigator.clipboard.readText().then(function(t){if(t){linkInput.value=t;toastMsg('✅ 已粘贴');}else toastMsg('剪贴板为空');});}
    catch(e){toastMsg('请手动粘贴链接');}
}
</script>
</body>
</html>
